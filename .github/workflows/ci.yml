name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "file:./dev.db"
      JWT_SECRET: "ci-only-placeholder-secret"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      # Reports only, doesn't block the pipeline: the codebase currently has
      # ~5,000 pre-existing lint errors (eslint was silently OOM-crashing on
      # every run before the heap size was fixed, so this had never actually
      # completed before). Fixing that is a real, separate cleanup project —
      # tracking it here means it stays visible without blocking every PR
      # until it's done. Promote back to blocking once the backlog is clear.
      - name: Lint (não bloqueia — ver comentário)
        run: npm run lint
        continue-on-error: true

      - name: Prisma generate
        run: npx prisma generate

      - name: Production build
        run: npm run build
