services:
  app:
    build:
      context: .
      args:
        # NEXT_PUBLIC_* is baked into the client bundle at build time — see
        # the Dockerfile comment. Leave unset to keep the Google button
        # hidden (nothing breaks; it's just not shown).
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: file:/app/data/dev.db
      JWT_SECRET: ${JWT_SECRET:?Defina JWT_SECRET no seu .env}
      NODE_ENV: production
      # Public base URL — used for e-mail links and the Mercado Pago webhook /
      # back_url. Set to your HTTPS address (subdomínio da plataforma ou domínio).
      APP_URL: ${APP_URL:-}
      # Read server-side, per-request (src/app/api/auth/google/route.ts) —
      # unlike NEXT_PUBLIC_GOOGLE_CLIENT_ID above, this one only needs to be
      # in the running container, not baked in at build time.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      # E-mail (Resend) — redefinição de senha.
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      # Pagamento (Mercado Pago) — assinatura das barbearias.
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN:-}
      # WhatsApp (Meta Cloud API) — confirmação de agendamento.
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
    volumes:
      - db-data:/app/data
      - uploads-data:/app/public/uploads
    restart: unless-stopped
    healthcheck:
      # No curl/wget in the slim image — a plain node one-liner avoids
      # installing anything just for this.
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  mobile-web:
    build:
      context: ./mobile
      args:
        # Browser-reachable address for the API — Flutter Web bakes this in
        # at build time, so it can't be a Docker-internal service name like
        # http://app:3000. Override via MOBILE_API_BASE_URL in .env for a
        # non-localhost deploy (e.g. a real domain).
        API_BASE_URL: ${MOBILE_API_BASE_URL:-http://localhost:3000/api/v1}
    ports:
      - "8081:80"
    restart: unless-stopped
    depends_on:
      - app

volumes:
  db-data:
  uploads-data:
