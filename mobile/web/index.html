<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Agende seu horário na barbearia.">
  <meta name="theme-color" content="#0B0A0F">

  <!-- PWA / iOS "Adicionar à Tela de Início". Brand name + icon are per-shop;
       in the white-label build these come from the Aparência do app config. -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Cortezz Barbearia">
  <link rel="apple-touch-icon" href="brand-icon.jpg">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Cortezz Barbearia</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // Marca por barbearia, sem rebuild.
    //
    // O ícone e o nome estavam fixos no build: um arquivo servindo todas as
    // barbearias. Pior, brand-icon.jpg era uma foto 800x1421, e o iOS recorta
    // o centro de imagem não quadrada — metade da logo sumia.
    //
    // Com ?shop=<slug> no link que o gestor compartilha, apontamos o ícone
    // para /api/brand/icon, que devolve a logo daquela barbearia já quadrada.
    // O Safari lê essas tags no momento em que a pessoa toca em "Adicionar à
    // Tela de Início", então trocá-las agora vale para a instalação.
    (function () {
      var API = 'https://cortix-pied.vercel.app';
      var slug = new URLSearchParams(location.search).get('shop');
      // Depois de instalado não há query string — por isso o slug fica salvo.
      try {
        if (slug) localStorage.setItem('cortix_brand_slug', slug);
        else slug = localStorage.getItem('cortix_brand_slug');
      } catch (e) { /* modo privado bloqueia storage; segue sem persistir */ }
      if (!slug) return;

      var icon = API + '/api/brand/icon?slug=' + encodeURIComponent(slug);
      function set(rel, href, sizes) {
        var l = document.querySelector('link[rel="' + rel + '"]') || document.createElement('link');
        l.rel = rel; l.href = href;
        if (sizes) l.sizes = sizes;
        document.head.appendChild(l);
      }
      set('apple-touch-icon', icon + '&size=180');
      set('icon', icon + '&size=192');

      // Troca o manifesto pelo da barbearia. É o passo que faz a marca
      // sobreviver à INSTALAÇÃO: o app aberto pela tela de início não usa a
      // URL visitada, e sim o start_url do manifesto — que no estático era
      // "/", sem o ?shop=. Por isso, depois de instalar, o login voltava à
      // marca padrão.
      var manifestUrl = API + '/api/brand/manifest?slug=' + encodeURIComponent(slug) +
        '&app=' + encodeURIComponent(location.origin);
      var m = document.querySelector('link[rel="manifest"]');
      if (m) {
        m.href = manifestUrl;
        // Manifesto de outra origem exige crossorigin, senão o navegador o
        // descarta e cai no padrão.
        m.crossOrigin = 'anonymous';
      }

      // Nome sob o ícone e título da aba.
      fetch(API + '/api/v1/barbershop?slug=' + encodeURIComponent(slug))
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (body) {
          var shop = body && (body.data || body);
          if (!shop || !shop.name) return;
          document.title = shop.name;
          var t = document.querySelector('meta[name="apple-mobile-web-app-title"]');
          if (t) t.content = shop.name;
          if (shop.primaryColor) {
            var tc = document.querySelector('meta[name="theme-color"]');
            if (tc) tc.content = shop.primaryColor;
          }
        })
        .catch(function () { /* sem rede: fica o nome padrão */ });
    })();
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
