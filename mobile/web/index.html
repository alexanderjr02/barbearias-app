<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Agende seu horário na barbearia.">
  <meta name="theme-color" content="%%CORTIX_THEME_COLOR%%">

  <!--
    PWA / iOS "Adicionar à Tela de Início" — marca por barbearia.

    Isto NÃO é mais preenchido por JavaScript depois que a página carrega.
    Os marcadores CORTIX_ abaixo são substituídos pelo SERVIDOR, antes de
    qualquer byte chegar ao navegador — veja mobile/web-deploy-src/api/index.js.
    A troca por JS que existia aqui tinha uma corrida real com o Safari: quem
    tocasse em "Adicionar à Tela de Início" antes do script terminar (ou com o
    service worker servindo uma cópia em cache) caía na marca genérica. Com o
    HTML já certo desde a primeira resposta, essa corrida deixa de existir.
  -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="%%CORTIX_NAME%%">
  <link rel="apple-touch-icon" href="%%CORTIX_ICON_URL%%">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>%%CORTIX_NAME%%</title>
  <link rel="manifest" href="%%CORTIX_MANIFEST_URL%%" crossorigin="anonymous">

  <script>
    // Limpa service worker/cache de instalações anteriores. O app não
    // registra mais um service worker (ver web/flutter_bootstrap.js) porque
    // era ele quem guardava uma cópia velha do index.html — com a marca de
    // OUTRA barbearia ou a tela de login antiga — e a servia em vez de
    // buscar a versão nova. Isso roda uma vez por aparelho: se não havia
    // nada registrado, é instantâneo e não faz nada.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (r) { r.unregister(); });
      });
      if (window.caches) {
        caches.keys().then(function (names) {
          names.forEach(function (name) { caches.delete(name); });
        });
      }
    }
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
