<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Agende seu horário na barbearia.">
  <meta name="theme-color" content="%%CORTIX_THEME_COLOR%%">

  <!--
    PWA / iOS "Adicionar à Tela de Início" — marca por barbearia.

    Isto NÃO é mais preenchido por JavaScript depois que a página carrega.
    Os marcadores CORTIX_ abaixo são substituídos pelo SERVIDOR, antes de
    qualquer byte chegar ao navegador — veja mobile/web-deploy-src/api/index.js.
    A troca por JS que existia aqui tinha uma corrida real com o Safari: quem
    tocasse em "Adicionar à Tela de Início" antes do script terminar (ou com o
    service worker servindo uma cópia em cache) caía na marca genérica. Com o
    HTML já certo desde a primeira resposta, essa corrida deixa de existir.
  -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="%%CORTIX_NAME%%">
  <link rel="apple-touch-icon" href="%%CORTIX_ICON_URL%%">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>%%CORTIX_NAME%%</title>
  <link rel="manifest" href="%%CORTIX_MANIFEST_URL%%" crossorigin="anonymous">

  <script>
    // Limpa o service worker de CACHE do Flutter de instalações anteriores —
    // era ele quem guardava uma cópia velha do index.html (marca de outra
    // barbearia, tela de login antiga) e a servia em vez de buscar a nova.
    //
    // MAS poupa o push-sw.js: esse não intercepta rede nem guarda HTML (é só
    // notificação), então não tem o problema do cache — e removê-lo a cada
    // carregamento desligaria o push que a pessoa acabou de ativar.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (r) {
          var script = (r.active && r.active.scriptURL) ||
                       (r.waiting && r.waiting.scriptURL) ||
                       (r.installing && r.installing.scriptURL) || '';
          if (script.indexOf('push-sw.js') === -1) r.unregister();
        });
      });
      if (window.caches) {
        caches.keys().then(function (names) {
          names.forEach(function (name) { caches.delete(name); });
        });
      }
    }

    // Ponte de push chamada pelo app Flutter. Toda a mecânica do navegador
    // (permissão, service worker, assinatura) mora aqui em JS puro; o Dart só
    // chama window.cortixPush.enable(token, apiBase) num toque de botão e lê o
    // resultado. Feito assim porque requestPermission() do iOS exige ser
    // chamado dentro do gesto do usuário e com o mínimo de espera antes.
    (function () {
      function supported() {
        return ('serviceWorker' in navigator) && ('PushManager' in window) && ('Notification' in window);
      }

      // A chave VAPID vem em base64url; o navegador quer um Uint8Array.
      function urlB64ToUint8Array(base64) {
        var padding = '='.repeat((4 - (base64.length % 4)) % 4);
        var b64 = (base64 + padding).replace(/-/g, '+').replace(/_/g, '/');
        var raw = atob(b64);
        var out = new Uint8Array(raw.length);
        for (var i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
        return out;
      }

      function statusNow() {
        if (!supported()) {
          // No iPhone o push só existe com o app INSTALADO na tela de início.
          // Um Safari normal do iOS nem tem window.Notification — então
          // distinguimos "precisa instalar" de "navegador não suporta".
          var isIOS = /iP(hone|ad|od)/.test(navigator.userAgent);
          var standalone = window.navigator.standalone === true ||
            (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches);
          if (isIOS && !standalone) return 'needs-install';
          return 'unsupported';
        }
        return Notification.permission; // 'granted' | 'denied' | 'default'
      }

      window.cortixPush = {
        status: function () { return statusNow(); },

        enable: function (token, apiBase) {
          if (!supported()) return Promise.resolve(statusNow());

          // Permissão PRIMEIRO, ainda dentro do gesto — o Safari do iOS recusa
          // se houver await demais antes desta chamada.
          return Notification.requestPermission().then(function (perm) {
            if (perm !== 'granted') return perm; // 'denied' | 'default'

            return navigator.serviceWorker.register('push-sw.js')
              .then(function () { return navigator.serviceWorker.ready; })
              .then(function (reg) {
                return fetch(apiBase + '/push/public-key')
                  .then(function (r) { return r.json(); })
                  .then(function (body) {
                    if (!body || !body.enabled || !body.key) throw new Error('push desligado no servidor');
                    return reg.pushManager.subscribe({
                      userVisibleOnly: true,
                      applicationServerKey: urlB64ToUint8Array(body.key),
                    });
                  });
              })
              .then(function (sub) {
                var json = sub.toJSON();
                return fetch(apiBase + '/push/subscribe', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                  body: JSON.stringify({
                    endpoint: json.endpoint,
                    keys: json.keys,
                    userAgent: navigator.userAgent,
                  }),
                });
              })
              .then(function (r) {
                if (!r.ok) throw new Error('falha ao registrar assinatura (' + r.status + ')');
                return 'granted';
              });
          }).catch(function (e) {
            console.error('[cortixPush] enable falhou', e);
            return 'error';
          });
        },

        disable: function (token, apiBase) {
          if (!supported()) return Promise.resolve('unsupported');
          return navigator.serviceWorker.ready
            .then(function (reg) { return reg.pushManager.getSubscription(); })
            .then(function (sub) {
              if (!sub) return 'ok';
              var endpoint = sub.endpoint;
              return sub.unsubscribe().then(function () {
                return fetch(apiBase + '/push/unsubscribe', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                  body: JSON.stringify({ endpoint: endpoint }),
                }).then(function () { return 'ok'; });
              });
            })
            .catch(function (e) { console.error('[cortixPush] disable falhou', e); return 'error'; });
        },
      };
    })();
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
